<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Systems of Intelligence — Chapter Preview</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
  :root{--reading-scale:1}
  html,body{margin:0;padding:0;background:#f4f1ec;color:#1a1a1a;font-family:'EB Garamond',Georgia,serif}
  *{box-sizing:border-box}
  .layout{display:grid;grid-template-columns:240px 1fr;height:100vh;overflow:hidden}
  #mobile-toggle{display:none;position:fixed;bottom:20px;left:20px;z-index:25;width:48px;height:48px;border-radius:50%;border:none;background:#0a0a0a;color:#fff;font-size:22px;box-shadow:0 2px 16px rgba(0,0,0,0.35);cursor:pointer;font-family:'Barlow Condensed',sans-serif;line-height:1}
  #mobile-toggle:hover{background:#e8722a}
  .sidebar-overlay{display:none}

  /* Sidebar */
  .sidebar{position:sticky;top:0;height:100vh;overflow-y:auto;background:#ebebeb;border-right:1px solid #0a0a0a;padding:20px 0;font-family:'Barlow Condensed',sans-serif}
  .sidebar h1{margin:0 20px 4px;font-size:14px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase}
  .sidebar .sub{margin:0 20px 16px;font-size:10px;color:#5a5a5a;letter-spacing:0.04em;text-transform:uppercase}
  .sidebar .group{margin-top:14px}
  .sidebar .group-title{padding:4px 20px;font-size:9px;color:#7a7a7a;letter-spacing:0.08em;text-transform:uppercase;font-weight:600}
  .sidebar button{display:block;width:100%;text-align:left;padding:8px 20px;border:none;background:transparent;font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.03em;text-transform:uppercase;color:#1a1a1a;cursor:pointer;border-left:3px solid transparent}
  .sidebar button:hover{background:#ddd8ca}
  .sidebar button.active{background:#0a0a0a;color:#ebebeb;border-left-color:#e8722a;font-weight:600}
  .sidebar .fignum{color:#8a8a8a;font-size:9px;margin-left:6px}
  .sidebar button.active .fignum{color:#c0c0c0}
  .sidebar .pagecount{color:#8a8a8a;font-size:8px;margin-left:4px}
  .sidebar button.active .pagecount{color:#a0a0a0}

  /* Content area — slightly darker surround to make the white page pop */
  .stage{overflow-y:scroll;overflow-x:hidden;background:#e8e4dc;height:100vh}
  header{position:sticky;top:0;z-index:10;padding:10px 24px;background:rgba(232,228,220,0.97);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-bottom:1px solid #c0b8a8;display:flex;gap:12px;align-items:center;flex-wrap:wrap;font-family:'Barlow Condensed',sans-serif}
  header h2{margin:0;font-size:13px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;color:#5a5a5a}
  header button{font-family:'Barlow Condensed',sans-serif;font-size:10px;padding:4px 10px;border:1px solid #8a7a62;background:#fff;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;color:#5a4a30}
  header button:hover{background:#5a4a30;color:#fff}
  .font-ctrl{display:inline-flex;gap:2px;border:1px solid #8a7a62;border-radius:3px;overflow:hidden}
  .font-ctrl button{border:none;border-radius:0;padding:4px 8px;font-family:'EB Garamond',Georgia,serif;color:#5a4a30;background:#fff;cursor:pointer;line-height:1;letter-spacing:0}
  .font-ctrl button:not(:last-child){border-right:1px solid #d0c8b4}
  .font-ctrl button.active{background:#5a4a30;color:#fff}
  .font-ctrl button:hover:not(.active){background:#f4ede0;color:#5a4a30}
  .font-ctrl .fs-s{font-size:11px}
  .font-ctrl .fs-m{font-size:14px}
  .font-ctrl .fs-l{font-size:17px}
  #count{margin-left:auto;font-size:10px;font-family:monospace;color:#7a6a50}

  /* 6×9 book simulation: ~4.5" text block at 96dpi ≈ 540px */
  main{max-width:540px;margin:0 auto;padding:56px 40px 120px;background:#fff;min-height:100vh;box-shadow:0 0 40px rgba(0,0,0,0.06)}
  #content h1{font-size:calc(28px * var(--reading-scale));font-weight:600;margin:1.5em 0 0.4em;line-height:1.2}
  #content h2{font-size:calc(21px * var(--reading-scale));font-weight:600;margin:2em 0 0.5em;line-height:1.2;border-bottom:1px solid #c0b8a8;padding-bottom:4px}
  #content h3{font-size:calc(17px * var(--reading-scale));font-weight:600;margin:1.8em 0 0.4em}
  #content p{font-size:calc(15px * var(--reading-scale));line-height:1.7;margin:0.8em 0}
  #content blockquote{border-left:3px solid #c0b8a8;padding:4px 14px;margin:1em 0;color:#4a4030;font-style:italic;font-size:calc(14px * var(--reading-scale))}
  #content ul,#content ol{font-size:calc(15px * var(--reading-scale));line-height:1.7}
  #content code{font-family:'SF Mono',monospace;background:#ece6d8;padding:1px 4px;border-radius:2px;font-size:calc(12px * var(--reading-scale))}
  #content pre{background:#ece6d8;padding:12px;overflow:auto;font-size:calc(11px * var(--reading-scale));border-radius:4px}
  #content strong{font-weight:600;color:#0a0a0a}
  #content hr{border:none;border-top:1px solid #c0b8a8;margin:2em 0}
  /* Inline em stays inline — italics in running text */
  #content em{font-style:italic;color:#2a2018}
  /* Figure images */
  #content img{max-width:100%;width:100%;height:auto;display:block;margin:1.5em auto;background:#fff;border:1px solid #c0b8a8;padding:8px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
  /* Figure captions: a <p> whose only child is an <em> starting with "Figure" */
  #content p.caption{text-align:center;font-size:calc(12px * var(--reading-scale));color:#5a4a30;margin-top:-0.5em;margin-bottom:2em;line-height:1.4}
  #content p.caption em{font-style:italic;font-size:calc(12px * var(--reading-scale))}
  #content table{border-collapse:collapse;margin:1em 0;font-size:calc(13px * var(--reading-scale))}
  #content th,#content td{border:1px solid #c0b8a8;padding:5px 8px;text-align:left}
  #content th{background:#ece6d8;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;font-size:10px;letter-spacing:0.05em}
  .missing-img{display:inline-block;padding:40px 20px;background:#fff0f0;color:#7a1a1a;border:2px dashed #7a1a1a;font-family:monospace;font-size:12px;text-align:center;margin:1.5em auto}
  #err{padding:20px;background:#fff0f0;color:#7a1a1a;font-family:monospace;font-size:12px}
  .loading{text-align:center;color:#999;padding:40px;font-style:italic}

  /* ── Annotations ─────────────────────────────────────────────── */
  .ann-highlight{cursor:pointer;border-radius:2px;padding:0 1px;transition:background 0.15s;background:rgba(255,220,80,0.35)}
  .ann-highlight:hover{background:rgba(255,220,80,0.55)}
  .has-annotation{position:relative}
  .ann-marker{position:absolute;right:-98px;width:18px;height:16px;cursor:pointer;user-select:none}
  .ann-marker svg{display:block;width:100%;height:100%}

  #ann-popup{position:fixed;z-index:50;background:#0a0a0a;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;padding:5px 10px;border-radius:3px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.3);user-select:none}
  #ann-popup:hover{background:#e8722a}

  #ann-modal-overlay{display:none!important;pointer-events:none}
  #ann-modal{position:fixed;z-index:50;width:300px;background:#fffdf5;border:1px solid #c0b8a8;border-radius:6px;box-shadow:-4px 2px 20px rgba(0,0,0,0.12);font-family:'Barlow Condensed',sans-serif;display:none;overflow:hidden}
  .ann-modal-header{padding:12px 16px;background:#f4f1ec;border-bottom:1px solid #d0c8b4;display:flex;align-items:center;gap:8px}
  .ann-modal-header .title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;flex:1}
  .ann-modal-header .close{cursor:pointer;font-size:18px;color:#8a7a62;line-height:1}
  .ann-modal-header .close:hover{color:#0a0a0a}
  .ann-modal-body{padding:16px}
  .ann-modal-body .quote{font-family:'EB Garamond',serif;font-style:italic;font-size:13px;color:#5a4a30;border-left:3px solid #d0c8b4;padding:6px 10px;margin:0 0 12px;max-height:80px;overflow:hidden}
  .ann-modal-body label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#8a7a62;margin:8px 0 3px}
  .ann-modal-body input,.ann-modal-body select,.ann-modal-body textarea{width:100%;padding:6px 8px;border:1px solid #c0b8a8;border-radius:3px;font-family:'EB Garamond',serif;font-size:13px;background:#fff}
  .ann-modal-body textarea{height:80px;resize:vertical}
  .ann-modal-body select{font-family:'Barlow Condensed',sans-serif;font-size:12px}
  .ann-modal-footer{padding:10px 16px;border-top:1px solid #d0c8b4;display:flex;gap:8px;justify-content:flex-end}
  .ann-modal-footer button{font-family:'Barlow Condensed',sans-serif;font-size:11px;text-transform:uppercase;letter-spacing:0.05em;padding:6px 16px;border:1px solid #8a7a62;border-radius:3px;cursor:pointer}
  .ann-btn-save{background:#0a0a0a;color:#fff;border-color:#0a0a0a}
  .ann-btn-save:hover{background:#e8722a;border-color:#e8722a}
  .ann-btn-resolve{background:#1a5a32;color:#fff;border-color:#1a5a32}
  .ann-btn-resolve:hover{background:#16a34a;border-color:#16a34a}
  .ann-btn-cancel{background:#fff;color:#5a4a30}
  .ann-btn-cancel:hover{background:#f4f1ec}
  .ann-btn-delete{background:#7a1a1a;color:#fff;border-color:#7a1a1a}
  .ann-btn-delete:hover{background:#b91c1c;border-color:#b91c1c}

  #ann-panel{position:absolute;top:0;right:0;bottom:0;width:320px;background:#fffdf5;border-left:1px solid #c0b8a8;box-shadow:-4px 0 20px rgba(0,0,0,0.08);z-index:15;overflow-y:auto;display:none;font-family:'Barlow Condensed',sans-serif}
  .ann-panel-header{padding:12px 16px;border-bottom:1px solid #d0c8b4;display:flex;align-items:center}
  .ann-panel-header .title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;flex:1}
  .ann-panel-header .close{cursor:pointer;font-size:16px;color:#8a7a62}
  .ann-panel-item{padding:10px 16px;border-bottom:1px solid #ece6d8;cursor:pointer;transition:background 0.1s}
  .ann-panel-item:hover{background:#f4f1ec}
  .ann-panel-item .ann-quote{font-family:'EB Garamond',serif;font-size:12px;font-style:italic;color:#5a4a30;margin-bottom:4px;max-height:40px;overflow:hidden}
  .ann-panel-item .ann-meta{font-size:9px;color:#8a7a62;text-transform:uppercase;letter-spacing:0.04em}
  .ann-panel-item .ann-comment{font-family:'EB Garamond',serif;font-size:11px;color:#2a2018;margin-top:4px}
  .ann-panel-empty{padding:20px;text-align:center;color:#8a7a62;font-size:11px;text-transform:uppercase;letter-spacing:0.05em}

  .ann-badge{font-family:'Barlow Condensed',sans-serif;font-size:10px;padding:4px 10px;border:1px solid #8a7a62;background:#fff;cursor:pointer;letter-spacing:0.05em;text-transform:uppercase;color:#5a4a30;display:flex;align-items:center;gap:4px}
  .ann-badge:hover{background:#5a4a30;color:#fff}
  .ann-badge .dot{width:6px;height:6px;border-radius:50%;background:#e8722a}

  /* Page dividers — dotted line, page num in right margin */
  .page-break{position:relative;margin:32px -40px;height:0;border:none;border-top:2px dotted #d0c8b4}
  .page-break .page-num{position:absolute;right:-58px;top:-11px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:#a09070;letter-spacing:0.04em;white-space:nowrap}

  /* Page counter lives inside the header bar */
  .pg{display:flex;align-items:baseline;gap:6px;margin-left:auto;font-family:'Barlow Condensed',sans-serif}
  .pg .current{font-size:32px;font-weight:700;color:#1a1a1a;line-height:1;letter-spacing:-0.02em}
  .pg .sep{font-size:16px;color:#c0b8a8;font-weight:300}
  .pg .section-total{font-size:13px;color:#8a7a5a;font-weight:600}
  .pg .cumulative{font-size:9px;color:#a09070;letter-spacing:0.06em;text-transform:uppercase;margin-left:8px;border-left:1px solid #c0b8a8;padding-left:8px}
  /* ── Responsive: tablet ── */
  @media (max-width:900px){
    .layout{grid-template-columns:180px 1fr}
    .sidebar button{font-size:10px;padding:6px 12px}
    .sidebar h1{font-size:12px;margin:0 12px 4px}
    .sidebar .sub{margin:0 12px 12px;font-size:9px}
    .sidebar .group-title{padding:4px 12px;font-size:8px}
    header{gap:6px;padding:8px 12px}
    header h2{font-size:11px;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    header button{font-size:9px;padding:3px 6px}
    .pg .current{font-size:22px}
    .pg .section-total{font-size:11px}
    .pg .cumulative{font-size:8px;padding-left:4px;margin-left:4px}
    main{padding:32px 16px 80px;max-width:100%}
    #ann-modal{width:260px;left:auto!important;right:8px!important}
    #ann-panel{width:260px}
    #count{display:none}
  }
  /* ── Responsive: mobile ── */
  @media (max-width:600px){
    .layout{grid-template-columns:1fr}
    .sidebar{position:fixed!important;top:0;left:0;bottom:0;width:280px;z-index:20;transform:translateX(-100%);transition:transform 0.25s ease;border-right:1px solid #0a0a0a;height:100vh!important;box-shadow:4px 0 20px rgba(0,0,0,0.15);overflow-y:auto}
    .sidebar.open{transform:translateX(0)}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:19;display:none}
    .sidebar-overlay.open{display:block}
    #mobile-toggle{display:block}
    main{padding:24px 12px 80px;max-width:100%}
    #ann-modal{width:calc(100vw - 32px);left:16px!important;right:16px!important}
  }
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <button id="mobile-toggle">☰</button>
  <nav class="sidebar" id="sidebar-nav">
    <h1>Systems of Intelligence</h1>
    <div class="sub">Chapter preview · 65 figures · 17 sections</div>
    <div id="nav"></div>
  </nav>
  <div class="stage">
    <header>
      <h2 id="section-label">—</h2>
      <button id="reload">↻ Reload</button>
      <button id="raw" title="View source markdown">Raw</button>
      <button id="proof" title="Open in Proof (Ch01 only for now)">On Proof ↗</button>
      <div class="font-ctrl" title="Font size (keyboard: - / 0 / + or Ctrl/Cmd+- Ctrl/Cmd+0 Ctrl/Cmd+=)">
        <button class="fs-s" data-scale="0.875" aria-label="Small">A</button>
        <button class="fs-m" data-scale="1" aria-label="Medium">A</button>
        <button class="fs-l" data-scale="1.2" aria-label="Large">A</button>
      </div>
      <span id="count"></span>
      <button class="ann-badge" id="ann-toggle"><span class="dot"></span> <span id="ann-count">0</span> Notes</button>
      <div class="pg">
        <span class="current" id="pg-current">—</span>
        <span class="sep">/</span>
        <span class="section-total" id="pg-total">—</span>
        <span class="cumulative" id="pg-cumulative">—</span>
      </div>
    </header>
    <main id="content"><div class="loading">Select a section from the sidebar →</div></main>
    <div id="ann-popup" style="display:none">💬 Comment</div>
    <div id="ann-modal" style="display:none">
      <div class="ann-modal-header"><span class="title" id="ann-modal-title">Add Comment</span><span class="close" id="ann-modal-close">✕</span></div>
      <div class="ann-modal-body">
        <div class="quote" id="ann-modal-quote"></div>
        <div id="ann-modal-create">
          <label>Your name</label>
          <input type="text" id="ann-name" placeholder="Reviewer name" />
          <label>Comment</label>
          <textarea id="ann-comment" placeholder="Your note..."></textarea>
        </div>
        <div id="ann-modal-view" style="display:none">
          <label>Author</label><div id="ann-view-author"></div>
          <label>Comment</label><div id="ann-view-comment" style="font-family:'EB Garamond',serif;font-size:14px;color:#2a2018;margin-top:4px"></div>
        </div>
      </div>
      <div class="ann-modal-footer" id="ann-modal-footer-create">
        <button class="ann-btn-cancel" id="ann-cancel">Cancel</button>
        <button class="ann-btn-save" id="ann-save">Save</button>
      </div>
      <div class="ann-modal-footer" id="ann-modal-footer-view" style="display:none">
        <button class="ann-btn-delete" id="ann-delete">Delete</button>
        <button class="ann-btn-resolve" id="ann-resolve">✓ Resolve</button>
      </div>
    </div>
    <div id="ann-panel" style="display:none">
      <div class="ann-panel-header"><span class="title">Annotations</span><span class="close" id="ann-panel-close">✕</span></div>
      <div id="ann-panel-list"></div>
    </div>
  </div>
  <div id="ann-modal-overlay" style="display:none"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
const SECTIONS = [
  {label:"Preface",                            group:"Front matter", figs:1, path:"chapters/front-matter/preface/text/preface-with-figures.md"},
  {label:"Acknowledgments",                    group:"Front matter", figs:0, path:"chapters/front-matter/acknowledgments/text/acknowledgments-with-figures.md"},
  {label:"Prologue",                           group:"Front matter", figs:2, path:"chapters/front-matter/prologue/text/prologue-with-figures.md"},
  {label:"Ch01 · Coordination Revolution",     group:"Chapters",     figs:8, path:"chapters/ch01/text/chapter-01-with-figures.md", proof:"https://www.proofeditor.ai/d/ac13qw8o?token=13ad4f6a-31fa-423f-b677-fb72aeb3fbb0"},
  {label:"Ch02 · Dawn of Systems Intelligence",group:"Chapters",     figs:5, path:"chapters/ch02/text/chapter-02-with-figures.md"},
  {label:"Ch03 · Architecture",                group:"Chapters",     figs:6, path:"chapters/ch03/text/chapter-03-with-figures.md"},
  {label:"Ch04 · In Action",                   group:"Chapters",     figs:6, path:"chapters/ch04/text/chapter-04-with-figures.md"},
  {label:"Ch05 · Human-Systems Interaction",   group:"Chapters",     figs:5, path:"chapters/ch05/text/chapter-05-with-figures.md"},
  {label:"Ch06 · Consciousness",               group:"Chapters",     figs:5, path:"chapters/ch06/text/chapter-06-with-figures.md"},
  {label:"Ch07 · Engineering Reality",         group:"Chapters",     figs:5, path:"chapters/ch07/text/chapter-07-with-figures.md"},
  {label:"Ch08 · Beyond Human Intelligence",   group:"Chapters",     figs:6, path:"chapters/ch08/text/chapter-08-with-figures.md"},
  {label:"Ch09 · No Way Know-How",             group:"Chapters",     figs:6, path:"chapters/ch09/text/chapter-09-with-figures.md"},
  {label:"ChX · The Grand Coordination",       group:"Chapters",     figs:6, path:"chapters/chX/text/chapter-X-with-figures.md"},
  {label:"Appendix A · Mathematics",           group:"Back matter",  figs:4, path:"chapters/back-matter/appendix-a/text/appendix-a-with-figures.md"},
  {label:"Appendix B · Implementation",        group:"Back matter",  figs:0, path:"chapters/back-matter/appendix-b/text/appendix-b.md"},
  {label:"Appendix C · Resources",             group:"Back matter",  figs:0, path:"chapters/back-matter/appendix-c/text/appendix-c.md"},
  {label:"About the Author",                   group:"Back matter",  figs:0, path:"chapters/front-matter/about-author/text/about-author-with-figures.md"},
];

const nav = document.getElementById("nav");
const content = document.getElementById("content");
const countEl = document.getElementById("count");
const sectionLabel = document.getElementById("section-label");
const proofBtn = document.getElementById("proof");

// Build sidebar grouped by section type
(function buildNav(){
  const groups = {};
  SECTIONS.forEach((s,i)=>{ (groups[s.group] ||= []).push({...s, idx:i}); });
  const order = ["Front matter","Chapters","Back matter"];
  nav.innerHTML = "";
  order.forEach(g=>{
    if(!groups[g]) return;
    const gd = document.createElement("div");
    gd.className = "group";
    gd.innerHTML = `<div class="group-title">${g}</div>`;
    groups[g].forEach(s=>{
      const b = document.createElement("button");
      b.dataset.idx = s.idx;
      b.innerHTML = `${s.label}<span class="fignum">${s.figs}</span>`;
      b.addEventListener("click", ()=>load(s.idx));
      gd.appendChild(b);
    });
    nav.appendChild(gd);
  });
})();

function rewriteImages(html, basePath){
  return html.replace(/<img\s+([^>]*?)src="([^"]+)"/g, (m, attrs, src)=>{
    if(src.startsWith("http") || src.startsWith("/")) return m;
    const parts = basePath.split("/").filter(Boolean);
    const srcParts = src.split("/");
    for(const p of srcParts){
      if(p === "..") parts.pop();
      else if(p !== ".") parts.push(p);
    }
    const resolved = parts.join("/");
    return `<img ${attrs}src="${resolved}" onerror="this.outerHTML='<div class=&quot;missing-img&quot;>⚠ MISSING IMAGE: ${resolved}</div>'"`;
  });
}

const pgCurrent = document.getElementById("pg-current");
const pgTotal = document.getElementById("pg-total");
const pgCumulative = document.getElementById("pg-cumulative");

// Page proportions based on column width
// Text-only pages: 6×9 ratio → height = width × 1.5
// Pages with images: 6×11 ratio → height = width × 1.833
const COL_WIDTH = 540;
const PAGE_TEXT = Math.round(COL_WIDTH * (9/6));    // 810px
const PAGE_IMAGE = Math.round(COL_WIDTH * (11/6));  // 990px

// Cumulative page tracking: stores page count per section once loaded
const sectionPages = {};
function getCumulativeStart(idx){
  let sum = 0;
  for(let i = 0; i < idx; i++){
    sum += (sectionPages[i] || 0);
  }
  return sum;
}

function insertPageBreaks(container){
  container.querySelectorAll(".page-break").forEach(el=>el.remove());
  const children = Array.from(container.children);
  let accHeight = 0;
  let pageNum = 1;
  let pageHasImage = false;

  children.forEach(child=>{
    const h = child.getBoundingClientRect().height;
    // Check if this element is or contains an image
    const hasImg = child.tagName === "IMG" || child.querySelector("img") || child.classList.contains("missing-img");
    if(hasImg) pageHasImage = true;

    // Pick the threshold based on whether this page has an image
    const threshold = pageHasImage ? PAGE_IMAGE : PAGE_TEXT;

    accHeight += h;
    if(accHeight >= threshold){
      const pb = document.createElement("div");
      pb.className = "page-break";
      pb.innerHTML = `<span class="page-num">${pageNum}</span>`;
      child.parentNode.insertBefore(pb, child);
      pageNum++;
      accHeight = h;
      // Reset image flag for the new page — carry forward if this child itself has the image
      pageHasImage = hasImg;
    }
  });
}

function setupPageScroll(totalPages, sectionIdx){
  sectionPages[sectionIdx] = totalPages;
  const cumStart = getCumulativeStart(sectionIdx);
  const stage = document.querySelector(".stage");
  pgCurrent.textContent = "1";
  pgTotal.textContent = totalPages;
  pgCumulative.textContent = `p${cumStart + 1} of book`;

  // Trigger threshold: page number in header changes when the margin page-num
  // reaches the top 15% of the stage viewport
  const triggerZone = stage.clientHeight * 0.15;

  const updatePageNum = ()=>{
    const breaks = content.querySelectorAll(".page-break");
    const stageTop = stage.scrollTop + stage.getBoundingClientRect().top;
    let current = 1;
    breaks.forEach(pb=>{
      const pbTop = pb.getBoundingClientRect().top - stage.getBoundingClientRect().top;
      if(pbTop < triggerZone) current++;
    });
    pgCurrent.textContent = current;
    pgCumulative.textContent = `p${cumStart + current} of book`;
  };
  stage.removeEventListener("scroll", stage._pageScrollFn);
  stage._pageScrollFn = updatePageNum;
  stage.addEventListener("scroll", updatePageNum, {passive:true});
}

let currentIdx = 0;

async function load(i){
  currentIdx = i;
  const sec = SECTIONS[i];
  sectionLabel.textContent = sec.label;
  content.innerHTML = "<div class='loading'>loading…</div>";
  closeMobileSidebar();
  // Update active state
  document.querySelectorAll("nav.sidebar button").forEach(b=>{
    b.classList.toggle("active", +b.dataset.idx === i);
  });
  // Show/hide Proof button based on availability
  proofBtn.style.display = sec.proof ? "inline-block" : "none";
  try {
    const res = await fetch(sec.path + "?t=" + Date.now());
    if(!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const md = await res.text();
    const basePath = sec.path.substring(0, sec.path.lastIndexOf("/") + 1);
    const html = marked.parse(md);
    content.innerHTML = rewriteImages(html, basePath);
    // Post-process: mark figure-caption <p> elements
    content.querySelectorAll("p").forEach(p=>{
      const text = p.textContent.trim();
      if(text.startsWith("Figure ") && p.children.length <= 2 && p.querySelector("em")){
        p.classList.add("caption");
      }
    });

    // Insert phantom page breaks
    // 6×9 book page at ~540px column ≈ 750px content height per page
    insertPageBreaks(content);

    const figs = (md.match(/^!\[Figure/gm) || []).length;
    const words = md.split(/\s+/).filter(Boolean).length;
    const totalPages = content.querySelectorAll(".page-break").length + 1;
    countEl.textContent = `${figs} figures · ${words.toLocaleString()} words · ~${totalPages} pages`;

    // Apply annotation highlights
    applyHighlights();
    // Update page indicator on scroll
    setupPageScroll(totalPages, i);
    // Close panel on section switch
    annPanel.style.display = "none";
    // Scroll content area to top
    document.querySelector(".stage").scrollTo(0,0);
    // Persist selection
    localStorage.setItem("soi-preview-section", i);
  } catch(e) {
    content.innerHTML = `<div id='err'>Failed to load ${sec.path}: ${e.message}</div>`;
  }
}

// ── Font size control ───────────────────────────────────────────────
const FONT_KEY = "soi-reading-scale";
const SCALES = [0.875, 1, 1.2];
function applyScale(scale){
  document.documentElement.style.setProperty("--reading-scale", scale);
  localStorage.setItem(FONT_KEY, String(scale));
  document.querySelectorAll(".font-ctrl button").forEach(b=>{
    const s = parseFloat(b.dataset.scale);
    b.classList.toggle("active", Math.abs(s - scale) < 0.001);
  });
}
function currentScale(){
  const saved = parseFloat(localStorage.getItem(FONT_KEY));
  return SCALES.includes(saved) ? saved : 1;
}
document.querySelectorAll(".font-ctrl button").forEach(b=>{
  b.addEventListener("click", ()=>applyScale(parseFloat(b.dataset.scale)));
});
applyScale(currentScale());
// Keyboard: - (small), 0 (medium), + / = (large); with or without Ctrl/Cmd
document.addEventListener("keydown", e=>{
  if(e.target.matches("input, textarea")) return;
  const key = e.key;
  if(key === "-" || key === "_"){ e.preventDefault(); applyScale(0.875); }
  else if(key === "0"){ e.preventDefault(); applyScale(1); }
  else if(key === "+" || key === "="){ e.preventDefault(); applyScale(1.2); }
});

document.getElementById("reload").addEventListener("click", ()=>load(currentIdx));
document.getElementById("raw").addEventListener("click", ()=>{
  window.open(SECTIONS[currentIdx].path, "_blank");
});
proofBtn.addEventListener("click", ()=>{
  const sec = SECTIONS[currentIdx];
  if(sec.proof) window.open(sec.proof, "_blank");
});

// Pre-seed cumulative page counts by estimating from word counts (no rendering needed)
// ~250 words per 6×9 page is the book-industry standard
(async function seedPageCounts(){
  for(let i = 0; i < SECTIONS.length; i++){
    if(sectionPages[i]) continue;
    try {
      const res = await fetch(SECTIONS[i].path + "?t=seed");
      if(!res.ok) continue;
      const md = await res.text();
      const words = md.split(/\s+/).filter(Boolean).length;
      sectionPages[i] = Math.max(1, Math.round(words / 150));
    } catch(e){ sectionPages[i] = 0; }
  }
  // Update sidebar with page counts
  document.querySelectorAll("nav.sidebar button").forEach(b=>{
    const idx = +b.dataset.idx;
    const pages = sectionPages[idx];
    if(pages){
      let sp = b.querySelector(".pagecount");
      if(!sp){ sp = document.createElement("span"); sp.className="pagecount"; b.appendChild(sp); }
      sp.textContent = `~${pages}p`;
    }
  });
})();

// ── Annotation system ─────────────────────────────────────────────────
const GITHUB_REPO = "iamkhayyam/systemsofintelligence-book";
const PAGES_BASE = `https://${GITHUB_REPO.split("/")[0]}.github.io/${GITHUB_REPO.split("/")[1]}`;
const ANN_STORE_KEY = "soi-annotations";
const annPopup = document.getElementById("ann-popup");
const annModal = document.getElementById("ann-modal");
const annOverlay = document.getElementById("ann-modal-overlay");
const annPanel = document.getElementById("ann-panel");
const annPanelList = document.getElementById("ann-panel-list");
const annCount = document.getElementById("ann-count");
let currentAnnotations = [];
let pendingQuote = "";
let viewingAnnId = null;

// ── Storage ──────────────────────────────────────────────────────────
function getAllAnnotations(){
  try{ return JSON.parse(localStorage.getItem(ANN_STORE_KEY)||"{}"); }catch(e){ return {}; }
}
function getAnnotations(path){
  return (getAllAnnotations()[path]||[]).filter(a=>!a.resolved);
}
function saveLocal(path, annotations){
  const all = getAllAnnotations();
  all[path] = annotations;
  localStorage.setItem(ANN_STORE_KEY, JSON.stringify(all));
}
function addAnnotation(path, ann){
  const all = getAllAnnotations();
  (all[path] = all[path]||[]).push(ann);
  localStorage.setItem(ANN_STORE_KEY, JSON.stringify(all));
  // Fire-and-forget to GitHub
  dispatchToGitHub({action:"add", sectionPath:path, annotation:ann});
}
function resolveAnnotation(path, annId){
  const all = getAllAnnotations();
  (all[path]||[]).forEach(a=>{ if(a.id===annId) a.resolved=true; });
  localStorage.setItem(ANN_STORE_KEY, JSON.stringify(all));
  dispatchToGitHub({action:"resolve", sectionPath:path, annId:annId});
}
function deleteAnnotation(path, annId){
  const all = getAllAnnotations();
  all[path] = (all[path]||[]).filter(a=>a.id!==annId);
  localStorage.setItem(ANN_STORE_KEY, JSON.stringify(all));
}

// Merge remote annotations from GitHub Pages JSON
async function fetchRemoteAnnotations(){
  try{
    const res = await fetch(`${PAGES_BASE}/_meta/annotations.json?t=${Date.now()}`);
    if(!res.ok) return;
    const remote = await res.json();
    const local = getAllAnnotations();
    let merged = false;
    for(const [path, anns] of Object.entries(remote)){
      const localAnns = local[path]||[];
      const localIds = new Set(localAnns.map(a=>a.id));
      for(const a of anns){
        if(!localIds.has(a.id)){
          localAnns.push(a);
          merged = true;
        }
      }
      local[path] = localAnns;
    }
    if(merged) localStorage.setItem(ANN_STORE_KEY, JSON.stringify(local));
  }catch(e){ /* silent — remote may not exist yet */ }
}

function dispatchToGitHub(payload){
  // repository_dispatch — requires a PAT with repo scope stored in localStorage
  const pat = localStorage.getItem("soi-github-pat");
  if(!pat) return; // no token = local-only mode
  fetch(`https://api.github.com/repos/${GITHUB_REPO}/dispatches`, {
    method:"POST",
    headers:{"Authorization":`token ${pat}`,"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},
    body:JSON.stringify({event_type:"annotation",client_payload:payload})
  }).catch(()=>{});
}

// ── Highlight rendering ──────────────────────────────────────────────
function applyHighlights(){
  // Remove existing highlights
  content.querySelectorAll(".ann-highlight").forEach(el=>{
    el.replaceWith(...el.childNodes);
  });
  const path = SECTIONS[currentIdx].path;
  currentAnnotations = getAnnotations(path);
  annCount.textContent = currentAnnotations.length;
  if(!currentAnnotations.length) return;

  // Flatten all text nodes
  const walker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
  const textNodes = [];
  while(walker.nextNode()) textNodes.push(walker.currentNode);

  currentAnnotations.forEach(ann=>{
    const quote = ann.quote;
    if(!quote) return;

    // Re-collect text nodes (DOM may have changed from previous annotation)
    const freshWalker = document.createTreeWalker(content, NodeFilter.SHOW_TEXT);
    const nodes = [];
    while(freshWalker.nextNode()) nodes.push(freshWalker.currentNode);

    // Build a concatenated string with node boundaries mapped
    let concat = "";
    const map = []; // { node, startInConcat, length }
    for(const n of nodes){
      map.push({ node: n, start: concat.length, len: n.textContent.length });
      concat += n.textContent;
    }

    const matchIdx = concat.indexOf(quote);
    if(matchIdx === -1) return;
    const matchEnd = matchIdx + quote.length;

    // Find which text nodes overlap with [matchIdx, matchEnd)
    let firstSpan = null;
    for(const entry of map){
      const nodeStart = entry.start;
      const nodeEnd = entry.start + entry.len;
      // Skip nodes entirely before or after the match
      if(nodeEnd <= matchIdx || nodeStart >= matchEnd) continue;

      const offsetInNode = Math.max(0, matchIdx - nodeStart);
      const endInNode = Math.min(entry.len, matchEnd - nodeStart);

      const range = document.createRange();
      range.setStart(entry.node, offsetInNode);
      range.setEnd(entry.node, endInNode);
      const span = document.createElement("span");
      span.className = "ann-highlight";
      span.dataset.annId = ann.id;
      range.surroundContents(span);
      if(!firstSpan) firstSpan = span;
    }

    // Add marker using the first highlight span for positioning
    if(!firstSpan) return;
    const parentBlock = firstSpan.closest("p, li, h1, h2, h3, blockquote, div");
    if(parentBlock) parentBlock.classList.add("has-annotation");
    const marker = document.createElement("span");
    marker.className = "ann-marker";
    marker.innerHTML = '<svg viewBox="0 0 18 16"><path d="M9 1L1 15h16L9 1z" fill="#e8722a" stroke="#5a4a30" stroke-width="1"/><text x="9" y="13" text-anchor="middle" font-size="10" font-weight="700" font-family="Barlow Condensed,sans-serif" fill="#fff">!</text></svg>';
    marker.dataset.annId = ann.id;
    if(parentBlock){
      parentBlock.appendChild(marker);
      marker.style.top = firstSpan.offsetTop + "px";
    } else firstSpan.appendChild(marker);
  });
}

// ── Popup on text selection ──────────────────────────────────────────
const stage = document.querySelector(".stage");
// Convert viewport-relative rect to stage-scroll-relative coords
function toStageCoords(rect){
  const stageRect = stage.getBoundingClientRect();
  return {
    top: rect.top - stageRect.top + stage.scrollTop,
    left: rect.left - stageRect.left + stage.scrollLeft,
    width: rect.width,
    height: rect.height,
    bottom: rect.bottom - stageRect.top + stage.scrollTop,
    right: rect.right - stageRect.left + stage.scrollLeft
  };
}

// Annotation selection — use a simple approach that works at any scroll depth
// The popup is positioned using pageX/pageY from the event (absolute page coords),
// converted to stage-relative coords. No dependency on getBoundingClientRect.
let lastMouseUpY = 0;
let lastMouseUpX = 0;

document.addEventListener("mouseup", e=>{
  lastMouseUpX = e.clientX;
  lastMouseUpY = e.clientY;
  setTimeout(showPopupIfSelection, 20);
});

function showPopupIfSelection(){
  const sel = window.getSelection();
  if(!sel || sel.isCollapsed) { annPopup.style.display="none"; return; }
  const selText = sel.toString().trim();
  if(!selText) { annPopup.style.display="none"; return; }

  // position:fixed — use clientX/clientY directly, no scroll math
  const popX = lastMouseUpX;
  const popY = lastMouseUpY - 36;

  const wordCount = selText.split(/\s+/).length;

  if(wordCount > 500){
    annPopup.textContent = `⚠ ${wordCount} words — max 500`;
    annPopup.style.background = "#7a1a1a";
    annPopup.style.display = "block";
    annPopup.style.left = (popX - 60) + "px";
    annPopup.style.top = popY + "px";
    pendingQuote = "";
    setTimeout(()=>{ annPopup.style.display="none"; annPopup.textContent="💬 Comment"; annPopup.style.background=""; }, 2500);
    return;
  }

  annPopup.textContent = wordCount > 100 ? `💬 ${wordCount}w` : "💬 Comment";
  annPopup.style.background = "";
  annPopup.style.display = "block";
  annPopup.style.left = (popX - 40) + "px";
  annPopup.style.top = popY + "px";
  pendingQuote = selText;
}

document.addEventListener("mousedown", e=>{
  if(e.target !== annPopup && !annPopup.contains(e.target)){
    annPopup.style.display = "none";
  }
});

// ── Modal: create mode ───────────────────────────────────────────────
function positionModal(anchorEl){
  // position:fixed — use viewport coords directly
  const mainEl = document.querySelector("main");
  const mainRect = mainEl.getBoundingClientRect();
  const leftPos = Math.min(mainRect.right + 16, window.innerWidth - 320);
  let topPos;
  if(anchorEl && anchorEl.getBoundingClientRect){
    topPos = anchorEl.getBoundingClientRect().top;
  } else {
    topPos = lastMouseUpY;
  }
  // Clamp so modal doesn't go off-screen
  topPos = Math.max(60, Math.min(topPos, window.innerHeight - 400));
  annModal.style.left = leftPos + "px";
  annModal.style.top = topPos + "px";
}

annPopup.addEventListener("click", ()=>{
  annPopup.style.display = "none";
  window.getSelection().removeAllRanges();
  document.getElementById("ann-modal-quote").textContent = pendingQuote.length > 120 ? pendingQuote.substring(0,117)+"..." : pendingQuote;
  document.getElementById("ann-modal-title").textContent = "Add Comment";
  document.getElementById("ann-modal-create").style.display = "block";
  document.getElementById("ann-modal-view").style.display = "none";
  document.getElementById("ann-modal-footer-create").style.display = "flex";
  document.getElementById("ann-modal-footer-view").style.display = "none";
  document.getElementById("ann-name").value = localStorage.getItem("soi-reviewer-name")||"";
  document.getElementById("ann-comment").value = "";
  annModal.style.display = "block";
  /* overlay removed */
  positionModal(null);
  viewingAnnId = null;
});

// ── Modal: view mode (click on highlight or marker) ─────────────────
content.addEventListener("click", e=>{
  // Clicking the marker opens the same annotation as clicking the highlight
  const marker = e.target.closest(".ann-marker");
  let hl = e.target.closest(".ann-highlight");
  if(marker){
    const annId = marker.dataset.annId;
    hl = content.querySelector(`.ann-highlight[data-ann-id="${annId}"]`);
  }
  if(!hl) return;
  const annId = hl.dataset.annId;
  const ann = currentAnnotations.find(a=>a.id===annId);
  if(!ann) return;
  viewingAnnId = annId;
  document.getElementById("ann-modal-quote").textContent = ann.quote.length > 120 ? ann.quote.substring(0,117)+"..." : ann.quote;
  document.getElementById("ann-modal-title").textContent = "Annotation";
  document.getElementById("ann-modal-create").style.display = "none";
  document.getElementById("ann-modal-view").style.display = "block";
  document.getElementById("ann-modal-footer-create").style.display = "none";
  document.getElementById("ann-modal-footer-view").style.display = "flex";
  document.getElementById("ann-view-author").textContent = ann.author||"Anonymous";
  document.getElementById("ann-view-comment").textContent = ann.comment||"";
  annModal.style.display = "block";
  /* overlay removed */
  positionModal(hl.getBoundingClientRect());
});

// ── Modal actions ────────────────────────────────────────────────────
function closeModal(){
  annModal.style.display = "none";
  viewingAnnId = null;
}
document.getElementById("ann-modal-close").addEventListener("click", closeModal);
document.getElementById("ann-cancel").addEventListener("click", closeModal);
// Close modal on click outside
document.addEventListener("mousedown", e=>{
  if(annModal.style.display==="block" && !annModal.contains(e.target) && !e.target.closest(".ann-highlight") && !e.target.closest(".ann-marker") && e.target!==annPopup){
    closeModal();
  }
});

document.getElementById("ann-save").addEventListener("click", ()=>{
  const name = document.getElementById("ann-name").value.trim()||"Anonymous";
  localStorage.setItem("soi-reviewer-name", name);
  const ann = {
    id: "ann-"+Date.now()+"-"+Math.random().toString(36).substring(2,6),
    quote: pendingQuote,
    type: "note",
    author: name,
    comment: document.getElementById("ann-comment").value.trim(),
    createdAt: new Date().toISOString(),
    resolved: false
  };
  addAnnotation(SECTIONS[currentIdx].path, ann);
  closeModal();
  applyHighlights();
});

document.getElementById("ann-resolve").addEventListener("click", ()=>{
  if(!viewingAnnId) return;
  resolveAnnotation(SECTIONS[currentIdx].path, viewingAnnId);
  closeModal();
  applyHighlights();
});

document.getElementById("ann-delete").addEventListener("click", ()=>{
  if(!viewingAnnId) return;
  deleteAnnotation(SECTIONS[currentIdx].path, viewingAnnId);
  closeModal();
  applyHighlights();
});

// ── Panel ────────────────────────────────────────────────────────────
document.getElementById("ann-toggle").addEventListener("click", ()=>{
  const open = annPanel.style.display === "none";
  annPanel.style.display = open ? "block" : "none";
  if(open) renderPanel();
});
document.getElementById("ann-panel-close").addEventListener("click", ()=>{
  annPanel.style.display = "none";
});

function renderPanel(){
  const path = SECTIONS[currentIdx].path;
  const anns = getAnnotations(path);
  if(!anns.length){
    annPanelList.innerHTML = '<div class="ann-panel-empty">No annotations yet.<br/>Select text to add one.</div>';
    return;
  }
  annPanelList.innerHTML = anns.map(a=>`
    <div class="ann-panel-item" data-ann-id="${a.id}">
      <div class="ann-quote">"${(a.quote||"").substring(0,80)}${(a.quote||"").length>80?"...":""}"</div>
      <div class="ann-meta">${a.author||"Anon"} · ${new Date(a.createdAt).toLocaleDateString()}</div>
      <div class="ann-comment">${a.comment||""}</div>
    </div>
  `).join("");
  // Click panel item to scroll to highlight
  annPanelList.querySelectorAll(".ann-panel-item").forEach(el=>{
    el.addEventListener("click", ()=>{
      const hl = content.querySelector(`[data-ann-id="${el.dataset.annId}"]`);
      if(hl) hl.scrollIntoView({behavior:"smooth",block:"center"});
    });
  });
}

// ── Mobile sidebar toggle ─────────────────────────────────────────────
const mobileToggle = document.getElementById("mobile-toggle");
const sidebarNav = document.getElementById("sidebar-nav");
const sidebarOverlay = document.getElementById("sidebar-overlay");
mobileToggle.addEventListener("click", ()=>{
  sidebarNav.classList.toggle("open");
  sidebarOverlay.classList.toggle("open");
  mobileToggle.textContent = sidebarNav.classList.contains("open") ? "✕" : "☰";
});
sidebarOverlay.addEventListener("click", ()=>{
  sidebarNav.classList.remove("open");
  sidebarOverlay.classList.remove("open");
  mobileToggle.textContent = "☰";
});
// Close sidebar on section select (mobile)
function closeMobileSidebar(){
  if(window.innerWidth <= 800){
    sidebarNav.classList.remove("open");
    sidebarOverlay.classList.remove("open");
    mobileToggle.textContent = "☰";
  }
}

// Merge remote annotations on startup
fetchRemoteAnnotations();

// Restore last-selected section, or start with first
const saved = parseInt(localStorage.getItem("soi-preview-section") || "0", 10);
const start = isNaN(saved) || saved < 0 || saved >= SECTIONS.length ? 0 : saved;
load(start);
